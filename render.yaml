services:
  - type: web
    name: chamora
    env: node
    buildCommand: npm install
    startCommand: npm run setup:db && npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chamora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "5000"
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false

databases:
  - name: chamora-db
    databaseName: chamora
    user: chamora
