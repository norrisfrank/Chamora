<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Chamora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    /* ══════════ CORE STYLES ══════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --sidebar-w: 240px;
      --sidebar-bg: #0f1e14;
      --sidebar-border: #1e3326;
      --green: #1A4D2E;
      --green-mid: #256338;
      --green-light: #2d7a45;
      --gold: #F5A623;
      --gold-dim: rgba(245, 166, 35, 0.15);
      --bg: #f4f6f5;
      --surface: #ffffff;
      --surface-2: #f9faf9;
      --text: #141a16;
      --text-2: #4a5c52;
      --text-3: #8a9e93;
      --border: #e4ece7;
      --red: #ef4444;
      --shadow: 0 2px 16px rgba(20, 50, 30, 0.07);
      --radius: 14px;
    }

    body.dark-mode {
      --bg: #0a0f0c;
      --surface: #121a15;
      --surface-2: #1a241e;
      --text: #e4ece7;
      --text-2: #b0c4b8;
      --text-3: #708a7b;
      --border: #1e3326;
      --sidebar-bg: #050806;
      --sidebar-border: #121a15;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    html,
    body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px
    }

    /* Frosted Glass Background */
    body::before {
      content: '';
      position: fixed;
      inset: -60px;
      z-index: -2;
      background: radial-gradient(circle at 18% 22%, rgba(26, 77, 46, 0.15) 0%, transparent 58%), radial-gradient(circle at 78% 18%, rgba(245, 166, 35, 0.12) 0%, transparent 55%), linear-gradient(145deg, #f2f7f4 0%, #f8faf9 45%, #fffdf5 100%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(244, 246, 245, 0.55);
      backdrop-filter: blur(18px) saturate(1.2);
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden
    }

    /* ══════════ SIDEBAR ══════════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: width 0.3s ease;
    }

    .sidebar-logo {
      padding: 1.4rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: white;
      text-decoration: none;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chama-switch {
      margin: 0.85rem 0.9rem 0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      padding: 0.65rem 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .cs-avatar {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--green-mid), #3a9e5f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: white;
    }

    .cs-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: white;
      flex: 1;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 0.85rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      padding: 0.6rem 0.4rem 0.3rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.6rem 0.75rem;
      border-radius: 9px;
      text-decoration: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.83rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.85)
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(45, 122, 69, 0.25), rgba(26, 77, 46, 0.15));
      color: white;
      border: 1px solid rgba(45, 122, 69, 0.3);
    }

    .nav-item.active svg {
      color: var(--gold);
    }

    .nav-badge {
      margin-left: auto;
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--green-mid);
      color: white;
      padding: 1px 7px;
      border-radius: 100px;
    }

    .sidebar-footer {
      padding: 0.85rem 0.9rem;
      border-top: 1px solid var(--sidebar-border);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0.6rem 0.65rem;
      border-radius: 9px;
      cursor: pointer;
    }

    .user-av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-mid), #3a9e5f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: white;
    }

    .user-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: white;
    }

    .user-role {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
    }

    /* ══════════ MAIN CONTENT AREA ══════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .topbar-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      flex: 1;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      height: 36px;
      width: 240px;
    }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      font-size: 0.82rem;
      flex: 1;
    }

    .topbar-actions {
      display: flex;
      gap: 0.5rem;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .notif-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      border: 1.5px solid white;
    }

    #view-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ══════════ VIEW-SPECIFIC STYLES ══════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .kpi-card {
      padding: 1.25rem;
    }

    .kpi-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .kpi-val {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .kpi-label {
      font-size: 0.8rem;
      color: var(--text-3);
      font-weight: 500;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      color: var(--text-3);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.7rem;
    }

    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .hidden {
      display: none !important;
    }

    /* Fixed KPI floating icons issue */
    .kpi-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    /* Notifications Popup */
    #notif-popup {
      position: absolute;
      top: 65px;
      right: 20px;
      width: 320px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      z-index: 100;
      display: none;
    }

    .notif-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
    }

    .notif-item {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .notif-item:hover {
      background: var(--surface-2);
    }

    .notif-title {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .notif-time {
      font-size: 0.7rem;
      color: var(--text-3);
    }

    /* SPA View Transitions */
    #view-container {
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 1;
      transform: translateY(0);
    }

    #view-container.loading {
      opacity: 0;
      transform: translateY(10px);
    }

    /* Settings Redesign */
    .settings-tab-container {
      display: flex;
      gap: 2rem;
      min-height: 500px;
    }

    .settings-nav {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .settings-nav-btn {
      padding: 1rem 1.25rem;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-3);
      transition: all 0.2s ease;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-nav-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    .settings-nav-btn.active {
      background: var(--green);
      color: white;
      border-color: var(--green);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
    }

    .settings-content {
      flex: 1;
      padding-left: 1rem;
      border-left: 1px solid var(--border);
    }

    .settings-panel {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .settings-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

        socket.on('memberUpdated', () => this.refreshData());
        socket.on('memberDeleted', () => this.refreshData());
        socket.on('contributionAdded', () => this.refreshData());
        socket.on('contributionUpdated', () => this.refreshData());
        socket.on('contributionDeleted', () => this.refreshData());
        socket.on('loanUpdated', () => this.refreshData());
        socket.on('meetingUpdated', () => this.refreshData());
      },

      refreshData() {
        loadAnalytics();
        if (this.currentView === 'dashboard') loadRecentActivity();
        if (this.currentView === 'members') loadMembers();
        if (this.currentView === 'contributions') loadContributions();
        if (this.currentView === 'loans') loadLoans();
        if (this.currentView === 'minutes') loadMinutes();
      },

      handleRouting() {
        const hash = window.location.hash.replace('#', '') || 'dashboard';
        if (this.currentView === hash) return;

        const container = document.getElementById('view-container');
        container.classList.add('loading');

        setTimeout(() => {
          this.currentView = hash;
          const view = this.views[hash] || this.views.dashboard;

          // Update UI
          container.innerHTML = view.render();
          document.getElementById('page-title').innerText = view.title;

          // Update Sidebar
          document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
          const activeNav = document.getElementById(`nav-${hash}`);
          if (activeNav) activeNav.classList.add('active');

          // Run init logic
          if (view.init) view.init();

          // Hide all modals on route change
          document.querySelectorAll('.hidden').forEach(m => m.classList.add('hidden'));
          // Manual hide for modals that might be open
          ['addMemberModal', 'recordPaymentModal', 'requestLoanModal', 'createMeetingModal'].forEach(id => {
            const m = document.getElementById(id);
            if (m) m.classList.add('hidden');
          });

          container.classList.remove('loading');
        }, 150);
      }

    // ══════════ DATA FETCHING & LOGIC ══════════

    async function fetchWithAuth(url, options = {}) {
      const token = localStorage.getItem('token');
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };
      if (token) headers['Authorization'] = `Bearer ${token}`;

      return fetch(url, {
        ...options,
        headers,
        credentials: 'include'
      });
    }

    async function loadUserProfile() {
      try {
        const res = await fetchWithAuth(`${API_URL}/auth/me`);
        if (res.status === 401) return window.location.href = 'login.html';
        const user = await res.json();
        if (user) {
          document.getElementById('user-name').innerText = user.first_name + ' ' + user.last_name;
          document.getElementById('user-initials').innerText = (user.first_name[0] + user.last_name[0]).toUpperCase();
        }
      } catch (err) { console.error('Profile load failed', err); }
    }

    async function viewMinute(meetingId, title) {
      const viewer = document.getElementById('m-view-content');
      if (!viewer) return;
      document.getElementById('m-view-title').innerText = title;

      try {
        const res = await fetchWithAuth(`${API_URL}/meetings/${meetingId}/minutes`);
        const minute = await res.json();

        if (!minute) {
          viewer.innerHTML = `<div style="padding: 2rem; text-align: center; color: var(--text-3);">No detailed minutes found for this meeting.</div>`;
          return;
        }

        viewer.innerHTML = `
            <div style="background: var(--surface-2); border-radius: 12px; padding: 2rem; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);">
                <h4 style="margin-bottom: 1rem; border-bottom: 2px solid var(--green); display: inline-block;">Meeting Content</h4>
                <div style="line-height: 1.8; color: var(--text-2); white-space: pre-wrap;">${minute.content}</div>
                <div style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-3);">Recorded on: ${new Date(minute.recorded_at).toLocaleString()}</div>
            </div>
        `;
      } catch (e) {
        viewer.innerHTML = `Error loading minutes.`;
      }
    }

    function toggleNotifs() {
      const p = document.getElementById('notif-popup');
      p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function checkWelcomePopup() {
      // Always add welcome notification if not already present
      const list = document.getElementById('notif-list');
      if (!list.innerHTML.includes('Welcome Home')) {
        addNotification('Welcome Home!', 'Successully logged into your Chamora dashboard.', true);
      }

      if (sessionStorage.getItem('firstLogin') === 'true') {
        setTimeout(() => {
          addNotification('New Login Detected', 'Your account was accessed from a new device.', false);
          sessionStorage.removeItem('firstLogin');
        }, 800);
      }
    }

    function addNotification(title, text, isPersistent = false) {
      const list = document.getElementById('notif-list');
      if (!list) return;
      const item = document.createElement('div');
      item.className = 'notif-item';
      item.innerHTML = `<div class="notif-title">${title}</div><div class="notif-time">${text}</div>`;

      if (isPersistent) {
        list.appendChild(item); // Add to end (or top if you prefer)
      } else {
        list.prepend(item);
      }
      const dot = document.querySelector('.notif-dot');
      if (dot) dot.style.display = 'block';
    }

    async function testSTK() {
      const btn = event.target;
      const phone = document.getElementById('test-phone').value;
      const amount = document.getElementById('test-amount').value;
      if (!phone) return alert('Please enter phone number');

      btn.innerText = 'Sending...';
      btn.disabled = true;

      try {
        const res = await fetchWithAuth(`${API_URL}/billing/stkpush`, {
          method: 'POST',
          body: JSON.stringify({ phone: phone, amount: amount })
        });
        const data = await res.json();
        alert(data.CustomerMessage || 'STK Push Triggered Successfully!');
        addNotification('Payment Initiated', `STK Push sent to ${phone} for KSh ${amount}`);
      } catch (err) { alert('Internal server error'); }
      finally {
        btn.innerText = 'Request STK Push →';
        btn.disabled = false;
      }
    }
    function markAllRead() {
      const list = document.getElementById('notif-list');
      if (list) list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-3); font-size: 0.8rem;">No new notifications</div>';
      const dot = document.querySelector('.notif-dot');
      if (dot) dot.style.display = 'none';
      setTimeout(() => toggleNotifs(), 500);
    }

    function calcLoan() {
      const principal = parseFloat(document.getElementById('calc-amount').value) || 0;
      const rateMonth = parseFloat(document.getElementById('calc-rate').value) / 100 || 0;
      const months = parseFloat(document.getElementById('calc-months').value) || 1;

      const total = principal + (principal * rateMonth * months);
      const monthly = total / months;

      document.getElementById('calc-total').innerText = `KSh ${total.toLocaleString()}`;
      document.getElementById('calc-monthly').innerText = `KSh ${monthly.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
    }

    function showAddMemberModal() { document.getElementById('addMemberModal').classList.remove('hidden'); }
    function hideAddMemberModal() { document.getElementById('addMemberModal').classList.add('hidden'); }

    function setupAddMemberForm() {
      const form = document.getElementById('addMemberForm');
      if (!form) return;
      form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const firstName = document.getElementById('m-fname').value;
        const lastName = document.getElementById('m-lname').value;
        const email = document.getElementById('m-email').value;
        const phoneNumber = document.getElementById('m-phone').value;
        const role = document.getElementById('m-role').value;

        btn.innerText = 'Saving...';
        try {
          const res = await fetchWithAuth(`${API_URL}/members`, {
            method: 'POST',
            body: JSON.stringify({ firstName, lastName, email, phoneNumber, role })
          });
          if (!res.ok) throw new Error('Failed to add member');
          hideAddMemberModal();
          loadMembers();
          addNotification('Member Added', `${firstName} has been joined to the chama.`);
        } catch (err) { alert(err.message); }
        finally { btn.innerText = 'Save Member'; }
      };
    }

    async function loadMeetings() {
      try {
        const res = await fetchWithAuth(`${API_URL}/meetings`);
        const meetings = await res.json();
        const tbody = document.getElementById('meetings-list-body');
        if (!tbody) return;
        if (!meetings.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-3); padding: 2rem;">No upcoming meetings.</td></tr>';
          return;
        }
        tbody.innerHTML = meetings.map(m => `
            <tr>
                <td style="font-weight: 700;">${m.title}</td>
                <td>${new Date(m.date).toLocaleString()}</td>
                <td>${m.location}</td>
                <td>
                    ${m.meeting_link ? `<a href="${m.meeting_link}" target="_blank" class="btn-primary" style="font-size: 0.7rem; padding: 4px 10px; display: inline-flex;">Join Meeting</a>` : '<span style="color: var(--text-3); font-size: 0.7rem;">No link</span>'}
                </td>
            </tr>
        `).join('');
      } catch (err) { console.error('Meetings load failed', err); }
    }

    async function logout() {
      try {
        await fetchWithAuth(`${API_URL}/auth/logout`, { method: 'POST' });
        localStorage.removeItem('token');
        window.location.href = 'index.html';
      } catch (err) {
        console.error('Logout failed', err);
        localStorage.removeItem('token');
        window.location.href = 'index.html';
      }
    }

    // Initialize SPA
    ViewManager.init();
    setupAllFormListeners();
    checkWelcomePopup();

    // Socket listeners
    socket.on('memberAdded', () => { if (ViewManager.currentView === 'members') loadMembers(); loadAnalytics(); });
    socket.on('memberUpdate', () => { if (ViewManager.currentView === 'members') loadMembers(); });
    socket.on('contributionAdded', () => {
      if (ViewManager.currentView === 'contributions') loadContributions();
      if (ViewManager.currentView === 'dashboard') { loadRecentActivity(); loadAnalytics(); }
    });
    socket.on('loanAdded', () => { if (ViewManager.currentView === 'loans') loadLoans(); loadAnalytics(); });
    socket.on('meetingAdded', () => { if (ViewManager.currentView === 'meetings') loadMeetings(); });

    function showRecordPaymentModal() { document.getElementById('recordPaymentModal').classList.remove('hidden'); }
    function hideRecordPaymentModal() { document.getElementById('recordPaymentModal').classList.add('hidden'); }

    function setupRecordPaymentForm() {
      const form = document.getElementById('recordPaymentForm');
      if (!form) return;
      form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const amount = document.getElementById('p-amount').value;
        const groupId = document.getElementById('p-group').value;

        btn.innerText = 'Recording...';
        try {
          const res = await fetchWithAuth(`${API_URL}/contributions`, {
            method: 'POST',
            body: JSON.stringify({ amount, groupId })
          });
          if (!res.ok) throw new Error('Failed to record payment');
          hideRecordPaymentModal();
          if (ViewManager.currentView === 'contributions') loadContributions();
          if (ViewManager.currentView === 'dashboard') loadRecentActivity();
          addNotification('Payment Recorded', `Amount of KSh ${amount} has been added.`);
        } catch (err) { alert(err.message); }
        finally { btn.innerText = 'Record Payment'; }
      };
    }

    async function payWithMpesa() {
      const amount = document.getElementById('p-amount').value;
      const groupId = document.getElementById('p-group').value;
      const phone = document.getElementById('p-phone').value;

      if (!amount || !phone) return alert('Please enter amount and phone number');

      const btn = event.target;
      const originalText = btn.innerText;
      btn.innerText = 'Initializing...';
      btn.disabled = true;

      try {
        const res = await fetchWithAuth(`${API_URL}/contributions/mpesa`, {
          method: 'POST',
          body: JSON.stringify({ amount, groupId, phone })
        });
        const data = await res.json();
        if (res.ok) {
          alert('STK Push sent! Please check your phone.');
          hideRecordPaymentModal();
          if (ViewManager.currentView === 'contributions') loadContributions();
          addNotification('M-Pesa Initiated', `KSh ${amount} requested from ${phone}`);
        } else {
          alert('Error: ' + (data.message || 'Payment failed'));
        }
      } catch (err) {
        alert('Network error');
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    function showCreateMeetingModal() { document.getElementById('createMeetingModal').classList.remove('hidden'); }
    function hideCreateMeetingModal() { document.getElementById('createMeetingModal').classList.add('hidden'); }

    function setupCreateMeetingForm() {
      const form = document.getElementById('createMeetingForm');
      if (!form) return;
      form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const title = document.getElementById('mt-title').value;
        const date = document.getElementById('mt-date').value;
        const location = document.getElementById('mt-loc').value;
        const description = ""; // Optional for now, add to modal if needed
        const meetingLink = document.getElementById('mt-link').value;

        btn.innerText = 'Creating...';
        try {
          const res = await fetchWithAuth(`${API_URL}/meetings`, {
            method: 'POST',
            body: JSON.stringify({ title, date, location, description, meetingLink })
          });
          if (!res.ok) throw new Error('Failed to create event');
          hideCreateMeetingModal();
          alert('Event created successfully!');
          addNotification('Event Created', `${title} has been scheduled.`);
        } catch (err) { alert(err.message); }
        finally { btn.innerText = 'Create Event'; }
      };
    }

    function showRequestLoanModal() { document.getElementById('requestLoanModal').classList.remove('hidden'); }
    function hideRequestLoanModal() { document.getElementById('requestLoanModal').classList.add('hidden'); }

    function setupRequestLoanForm() {
      const form = document.getElementById('requestLoanForm');
      if (!form) return;
      form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const amount = document.getElementById('l-amount').value;
        const reason = document.getElementById('l-reason').value;

        btn.innerText = 'Submitting...';
        try {
          const res = await fetchWithAuth(`${API_URL}/loans/apply`, {
            method: 'POST',
            body: JSON.stringify({ amount, interest: 5, dueDate: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000) }) // Default 5% / 30 days
          });
          if (!res.ok) throw new Error('Failed to request loan');
          hideRequestLoanModal();
          if (ViewManager.currentView === 'loans') loadLoans();
          addNotification('Loan Requested', `Your application for KSh ${amount} has been submitted.`);
        } catch (err) { alert(err.message); }
        finally { btn.innerText = 'Submit Request'; }
      };
    }

    // ══════════ SETTINGS & DARK MODE ══════════

    function toggleDarkMode(isDark) {
      if (isDark) {
        document.body.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark');
      } else {
        document.body.classList.remove('dark-mode');
        localStorage.setItem('theme', 'light');
      }
    }

    function applyInitialTheme() {
      const theme = localStorage.getItem('theme');
      if (theme === 'light') {
        document.body.classList.remove('dark-mode');
      } else {
        document.body.classList.add('dark-mode');
      }
    }

    async function setupSettingsLogic() {
      const modeToggle = document.getElementById('dark-mode-toggle');
      if (modeToggle) {
        modeToggle.checked = document.body.classList.contains('dark-mode');
      }

      // Populate Display Name
      const nameInput = document.getElementById('s-name');
      const emailInput = document.getElementById('s-email');
      if (nameInput) nameInput.value = document.getElementById('user-name').innerText;
      if (emailInput) {
        try {
          const res = await fetchWithAuth(`${API_URL}/auth/me`);
          const user = await res.json();
          emailInput.value = user.email;
        } catch (e) { }
      }

      const pwForm = document.getElementById('changePasswordForm');
      if (pwForm) {
        pwForm.onsubmit = async (e) => {
          e.preventDefault();
          const currentPassword = document.getElementById('cp-current').value;
          const newPassword = document.getElementById('cp-new').value;
          const btn = e.target.querySelector('button');

          btn.innerText = 'Updating...';
          try {
            const res = await fetchWithAuth(`${API_URL}/auth/change-password`, {
              method: 'POST',
              body: JSON.stringify({ currentPassword, newPassword })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Update failed');
            alert('Password updated successfully!');
            pwForm.reset();
          } catch (err) {
            alert(err.message);
          } finally {
            btn.innerText = 'Update Password';
          }
        };
      }
    }

    applyInitialTheme();

    function handleGlobalSearch(e) {
      if (e.key === 'Enter') {
        const query = e.target.value.toLowerCase().trim();
        const views = Object.keys(ViewManager.views);
        // Find if query matches any view name
        const match = views.find(v => query.includes(v)) ||
          (query.includes('pay') ? 'contributions' : null) ||
          (query.includes('borrow') ? 'loans' : null) ||
          (query.includes('stat') ? 'analytics' : null);

        if (match) {
          window.location.hash = match;
          e.target.value = '';
        } else {
          alert('No section found for: "' + query + '". Try searching for "members", "loans", or "analytics".');
        }
      }
    }
    function setupAllFormListeners() {
      setupAddMemberForm();
      setupRecordPaymentForm();
      setupRequestLoanForm();
      setupCreateMeetingForm();
    }

    function switchSettingsTab(tabId, btn) {
      // Update Buttons
      document.querySelectorAll('.settings-nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Update Panels
      document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('settings-' + tabId).classList.add('active');
    }

    async function setupSettingsLogic() {
      const modeToggle = document.getElementById('dark-mode-toggle');
      if (modeToggle) {
        modeToggle.checked = document.body.classList.contains('dark-mode');
      }

      // Populate Display Name
      const nameInput = document.getElementById('s-name');
      const emailInput = document.getElementById('s-email');
      const initialsDiv = document.getElementById('settings-av');

      try {
        const res = await fetchWithAuth(`${API_URL}/auth/me`);
        const user = await res.json();
        if (nameInput) nameInput.value = `${user.first_name} ${user.last_name}`;
        if (emailInput) emailInput.value = user.email;
        if (initialsDiv) initialsDiv.innerText = (user.first_name[0] + user.last_name[0]).toUpperCase();
      } catch (e) { }

      const pwForm = document.getElementById('changePasswordForm');
      if (pwForm) {
        pwForm.onsubmit = async (e) => {
          e.preventDefault();
          const currentPassword = document.getElementById('cp-current').value;
          const newPassword = document.getElementById('cp-new').value;
          const btn = e.target.querySelector('button');

          const originalText = btn.innerText;
          btn.innerText = 'Updating...';
          btn.disabled = true;
          try {
            const res = await fetchWithAuth(`${API_URL}/auth/change-password`, {
              method: 'POST',
              body: JSON.stringify({ currentPassword, newPassword })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Update failed');
            alert('Password updated successfully!');
            pwForm.reset();
          } catch (err) {
            alert(err.message);
          } finally {
            btn.innerText = originalText;
            btn.disabled = false;
          }
        };
      }

      const profileForm = document.getElementById('updateProfileForm');
      if (profileForm) {
        profileForm.onsubmit = async (e) => {
          e.preventDefault();
          alert('Profile update functionality ready for production backend integration.');
        };
      }
    }
  </script>
